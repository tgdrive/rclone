---
# Create a GitHub Release with cross-compiled binaries when a tag is pushed.
# Mirrors the official rclone build.yml matrix but publishes to a GitHub
# Release instead of uploading to beta.rclone.org.
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.job_name }}
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        job_name:
          - linux
          - linux_386
          - mac_amd64
          - mac_arm64
          - windows
          - other_os

        include:
          - job_name: linux
            os: ubuntu-latest
            go: '~1.26.3'
            gotags: cmount
            build_flags: '-include "^linux/"'
            deploy: true

          - job_name: linux_386
            os: ubuntu-latest
            go: '~1.26.3'
            goarch: 386
            gotags: cmount

          - job_name: mac_amd64
            os: macos-latest
            go: '~1.26.3'
            gotags: cmount
            build_flags: '-include "^darwin/amd64" -cgo'
            deploy: true

          - job_name: mac_arm64
            os: macos-latest
            go: '~1.26.3'
            gotags: cmount
            build_flags: '-include "^darwin/arm64" -cgo -macos-arch arm64 -cgo-cflags=-I/usr/local/include -cgo-ldflags=-L/usr/local/lib'
            deploy: true

          - job_name: windows
            os: windows-latest
            go: '~1.26.3'
            gotags: cmount
            cgo: '0'
            build_flags: '-include "^windows/"'
            build_args: '-buildmode exe'
            deploy: true

          - job_name: other_os
            os: ubuntu-latest
            go: '~1.26.3'
            build_flags: '-exclude "^(windows/|darwin/|linux/)"'
            compile_all: true
            deploy: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Set environment variables
        run: |
          echo 'GOTAGS=${{ matrix.gotags }}' >> $GITHUB_ENV
          echo 'BUILD_FLAGS=${{ matrix.build_flags }}' >> $GITHUB_ENV
          echo 'BUILD_ARGS=${{ matrix.build_args }}' >> $GITHUB_ENV
          if [[ "${{ matrix.goarch }}" != "" ]]; then echo 'GOARCH=${{ matrix.goarch }}' >> $GITHUB_ENV ; fi
          if [[ "${{ matrix.cgo }}" != "" ]]; then echo 'CGO_ENABLED=${{ matrix.cgo }}' >> $GITHUB_ENV ; fi

      - name: Install Libraries on Linux
        run: |
          sudo modprobe fuse
          sudo chmod 666 /dev/fuse
          sudo chown root:$USER /etc/fuse.conf
          sudo apt-get update
          sudo apt-get install -y fuse3 libfuse-dev rpm pkg-config git-annex git-annex-remote-rclone nfs-common
        if: matrix.os == 'ubuntu-latest'

      - name: Install Libraries on macOS
        run: |
          unset HOMEBREW_NO_INSTALL_FROM_API
          brew untap --force homebrew/core
          brew untap --force homebrew/cask
          brew update
          brew install --cask macfuse
          brew install git-annex git-annex-remote-rclone
        if: matrix.os == 'macos-latest'

      - name: Install Libraries on Windows
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          choco install -y winfsp zip
          echo "CPATH=C:\Program Files\WinFsp\inc\fuse;C:\Program Files (x86)\WinFsp\inc\fuse" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if ($env:GOARCH -eq "386") {
            choco install -y mingw --forcex86 --force
            echo "C:\\ProgramData\\chocolatey\\lib\\mingw\\tools\\install\\mingw32\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          $path = (get-command mingw32-make.exe).Path
          Copy-Item -Path $path -Destination (Join-Path (Split-Path -Path $path) 'make.exe')
        if: matrix.os == 'windows-latest'

      - name: Print Go version and environment
        run: |
          printf "Using go at: $(which go)\n"
          printf "Go version: $(go version)\n"
          printf "\n\nGo environment:\n\n"
          go env
          printf "\n\nRclone environment:\n\n"
          make vars

      - name: Build rclone
        run: |
          make

      - name: Build all architectures
        run: |
          make
          make compile_all
        if: matrix.compile_all

      - name: Cross-compile release binaries
        run: |
          TAG="${{ github.ref_name }}"
          git log "$(git describe --tags --abbrev=0 2>/dev/null || echo HEAD).." > /tmp/git-log.txt 2>/dev/null || true
          go run bin/cross-compile.go \
            -git-log /tmp/git-log.txt \
            -release "release" \
            $BUILD_FLAGS \
            $BUILDTAGS \
            $BUILD_ARGS \
            "$TAG"
        if: matrix.deploy

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.job_name }}-artifacts
          path: build/
          retention-days: 1
        if: matrix.deploy

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd /tmp/artifacts
          for f in *.zip *.tar.gz; do
            [ -f "$f" ] && sha256sum "$f" > "$f.sha256"
          done
          cat *.sha256 | sort -k2 > checksums.txt

      - name: Create and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p build
          cp -r /tmp/artifacts/* build/
          cp bin/upload-github /tmp/upload-github
          sed -i 's|REPO="rclone/rclone"|REPO="${{ github.repository }}"|' /tmp/upload-github
          bash /tmp/upload-github "${{ github.ref_name }}"

  docker:
    name: Build and push Docker images
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/artifacts
          merge-multiple: true

      - name: Stage Linux release zips for Docker build context
        run: |
          mkdir -p build
          cp /tmp/artifacts/rclone-*-linux-*.zip build/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform Docker images
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Publish Docker Plugin
        run: |
          VER=${GITHUB_REF_NAME}
          PLUGIN_USER=ghcr.io/${{ github.repository_owner }}
          for PLUGIN_ARCH in amd64 arm64 arm/v7 ;do
              export PLUGIN_ARCH
              export PLUGIN_USER
              make docker-plugin PLUGIN_TAG=${PLUGIN_ARCH/\//-}
              make docker-plugin PLUGIN_TAG=${PLUGIN_ARCH/\//-}-${VER#v}
          done
          make docker-plugin PLUGIN_ARCH=amd64 PLUGIN_TAG=latest
          make docker-plugin PLUGIN_ARCH=amd64 PLUGIN_TAG=${VER#v}
